name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run test

      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_URL: http://localhost:3000/
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
